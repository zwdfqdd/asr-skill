# ASR inference config — default template
# deploy_asr_service.sh will generate a production version with absolute paths

models:
  vad: "models/vad"
  asr: "models/asr"
  punc: "models/punc"

vad:
  threshold: 0.5
  min_speech_ms: 250
  min_silence_ms: 100
  speech_pad_ms: 30
  window_size: 512

audio:
  sample_rate: 16000
  channels: 1

features:
  n_mels: 80
  frame_length: 25
  frame_shift: 10
  window: "hamming"

server:
  host: "0.0.0.0"
  port: 2701

output:
  include_timestamps: true
  include_punctuation: true
  pretty_json: true
