# nginx.conf — Model download server with session-based auth
# Place in /etc/nginx/conf.d/model-server.conf
#
# Architecture:
#   Client → POST /api/session/start (get session_token + manifest)
#          → GET /files/<path>?session=<token>
#          → POST /api/session/complete (revoke session)
#
#   nginx auth_request validates session_token via middleware on every file request.
#
# Two server blocks:
#   - HTTP  (port 8080) for internal/LAN access
#   - HTTPS (port 443)  for public access (uncomment and configure SSL)

# ─── Rate limiting ───
limit_req_zone $binary_remote_addr zone=model_download:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=session_api:10m rate=3r/m;
limit_conn_zone $binary_remote_addr zone=model_conn:10m;

# ─── HTTP (internal LAN) ───
server {
    listen 8080;
    server_name _;

    client_max_body_size 10m;

    # ─── Session API (public) ───
    location /api/session/ {
        limit_req zone=session_api burst=2 nodelay;

        proxy_pass http://127.0.0.1:8901;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # ─── File download endpoint (session-protected) ───
    location /files/ {
        auth_request /auth_verify;
        auth_request_set $auth_status $upstream_status;

        limit_req zone=model_download burst=5 nodelay;
        limit_conn model_conn 3;

        autoindex off;

        alias /home/zhxg/zw/data/models/;
        try_files $uri =404;

        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";
        add_header Cache-Control "no-store";
    }

    # ─── Auth subrequest (internal) ───
    location = /auth_verify {
        internal;
        proxy_pass http://127.0.0.1:8901/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Session $arg_session;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ─── Admin API (localhost only) ───
    location /admin/ {
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:8901;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}

